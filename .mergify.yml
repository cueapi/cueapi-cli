# Mergify config — Dependabot batching for cueapi-cli.
#
# Regular PRs already auto-merge via the ``auto-merge`` job in
# ``.github/workflows/feature-to-main.yml`` (uses GitHub native
# auto-merge after the ``test`` job goes green). That flow is untouched.
#
# Mergify's job here: batch Dependabot version-bump PRs so we don't
# burn N CI runs and N PyPI-trigger publishes for what's effectively
# one weekly maintenance window.

queue_rules:
  - name: dependencies
    # ``merge_method`` lives on the queue rule (Mergify v2). The deprecated
    # ``method:`` field on ``actions.queue`` was removed.
    merge_method: squash
    batch_size: 5
    batch_max_wait_time: 30 m
    merge_conditions:
      # Mirrors the required check from feature-to-main.yml. Update both
      # together if the workflow's job ID or display name changes.
      - check-success=test

pull_request_rules:
  - name: batch-merge Dependabot PRs
    conditions:
      - or:
          - author=dependabot[bot]
          - author=dependabot
      - base=main
      - -draft
      - -conflict
      - label=dependencies
    actions:
      queue:
        name: dependencies
